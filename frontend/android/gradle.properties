# Increase memory to prevent "Out of Memory" crashes during build
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Enable the daemon to speed up repeated builds
org.gradle.daemon=true

# Standard AndroidX settings
android.useAndroidX=true
android.enableJetifier=true

# Disable Kotlin incremental compilation: avoids a Windows bug where the
# compiler crashes computing relative paths across different drive letters
# (project is on D:, Flutter/Gradle caches are on C:)
kotlin.incremental=false

# Force Gradle to use modern TLS protocols
systemProp.https.protocols=TLSv1.2,TLSv1.3
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
