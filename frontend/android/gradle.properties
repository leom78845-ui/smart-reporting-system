# Increase memory to prevent "Out of Memory" crashes during build
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Enable the daemon to speed up repeated builds
org.gradle.daemon=true

# Standard AndroidX settings
android.useAndroidX=true
android.enableJetifier=true

# These settings ensure compatibility with newer Flutter/Kotlin versions
android.newDsl=true
android.builtInKotlin=true
kotlin.incremental=false